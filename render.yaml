databases:
  - name: finsight-db
    plan: free
    # Render free Postgres expires 90 days after creation. When it does, /health's
    # `database.ok` flips to false — recreate the database and it re-links via
    # `fromDatabase` below (no code change needed, but session/portfolio/watchlist data
    # in the old database is gone).

services:
  - type: web
    name: finsight
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINSIGHT_USE_RERANKER
        value: "0"
      - key: FINSIGHT_RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: finsight-db
          property: connectionString
      # V6.3 Google OAuth — login is optional/additive; unset, the app runs anonymous-only.
      # FINSIGHT_BASE_URL must match this service's real URL (known only after first deploy)
      # and must be registered as an authorized redirect URI (BASE_URL + /api/auth/google/callback)
      # in the Google Cloud OAuth client console.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FINSIGHT_BASE_URL
        sync: false
      - key: FINSIGHT_COOKIE_SECURE
        value: "1"
      - key: FINSIGHT_ADMIN_EMAILS
        sync: false
